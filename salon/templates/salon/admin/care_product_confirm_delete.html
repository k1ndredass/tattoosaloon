{% extends 'base.html' %}

{% block title %}Удалить товар - Уход{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <h1 class="mb-4">Удалить товар</h1>
        <div class="alert alert-warning">
            <p>Вы уверены, что хотите удалить <strong>{{ product.title }}</strong>?</p>
            <p class="mb-0">Это действие нельзя отменить.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'admin_care_products' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
