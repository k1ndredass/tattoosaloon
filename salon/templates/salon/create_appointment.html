{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Создать запись - Тату-Салон{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h1 class="mb-4">Создать запись на сеанс</h1>
        <form method="post" id="appointmentForm">
            {% csrf_token %}
            {{ form|crispy }}
            <div id="timeInfo" class="alert alert-info mt-3" style="display: none;">
                <strong>Доступное время:</strong> <span id="availableTimesList"></span>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Создать запись</button>
                <a href="{% url 'appointments' %}" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Автоматически выбираем татуировку из URL параметра
    const urlParams = new URLSearchParams(window.location.search);
    const tattooId = urlParams.get('tattoo');
    if (tattooId) {
        document.getElementById('id_tattoo').value = tattooId;
    }

    // Функция для загрузки доступного времени
    function loadAvailableTimes() {
        const masterId = document.getElementById('id_master').value;
        const date = document.getElementById('id_date').value;
        const timeSelect = document.getElementById('id_time');
        const timeInfo = document.getElementById('timeInfo');
        const availableTimesList = document.getElementById('availableTimesList');

        // Очищаем текущие опции
        timeSelect.innerHTML = '<option value="">Загрузка...</option>';
        timeInfo.style.display = 'none';

        if (!masterId || !date) {
            timeSelect.innerHTML = '<option value="">Сначала выберите мастера и дату</option>';
            return;
        }

        // Получаем доступное время через AJAX
        fetch(`{% url 'get_available_times' %}?master_id=${masterId}&date=${date}`)
            .then(response => response.json())
            .then(data => {
                timeSelect.innerHTML = '';
                
                if (data.available_times && data.available_times.length > 0) {
                    // Добавляем пустую опцию
                    const emptyOption = document.createElement('option');
                    emptyOption.value = '';
                    emptyOption.textContent = 'Выберите время';
                    timeSelect.appendChild(emptyOption);
                    
                    // Добавляем доступные временные слоты
                    data.available_times.forEach(time => {
                        const option = document.createElement('option');
                        option.value = time;
                        option.textContent = time;
                        timeSelect.appendChild(option);
                    });
                    
                    // Показываем информацию о доступном времени
                    availableTimesList.textContent = data.available_times.join(', ');
                    timeInfo.style.display = 'block';
                    timeInfo.className = 'alert alert-info mt-3';
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = 'Нет доступного времени на эту дату';
                    timeSelect.appendChild(option);
                    
                    timeInfo.className = 'alert alert-warning mt-3';
                    availableTimesList.textContent = 'Все временные слоты заняты. Выберите другую дату.';
                    timeInfo.style.display = 'block';
                }
                
                // Показываем занятое время, если есть
                // Удаляем старую информацию о занятом времени
                const oldBookedInfo = timeInfo.querySelector('.booked-times-info');
                if (oldBookedInfo) {
                    oldBookedInfo.remove();
                }
                
                if (data.booked_times && data.booked_times.length > 0) {
                    const bookedInfo = document.createElement('div');
                    bookedInfo.className = 'mt-2 booked-times-info';
                    bookedInfo.innerHTML = `<small class="text-muted">Занятое время: ${data.booked_times.join(', ')}</small>`;
                    timeInfo.appendChild(bookedInfo);
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                timeSelect.innerHTML = '<option value="">Ошибка загрузки времени</option>';
            });
    }

    // Обработчики событий
    document.getElementById('id_master').addEventListener('change', loadAvailableTimes);
    document.getElementById('id_date').addEventListener('change', loadAvailableTimes);

    // Загружаем время при загрузке страницы, если уже выбраны мастер и дата
    window.addEventListener('load', function() {
        const masterId = document.getElementById('id_master').value;
        const date = document.getElementById('id_date').value;
        if (masterId && date) {
            loadAvailableTimes();
        }
    });
</script>
{% endblock %}
